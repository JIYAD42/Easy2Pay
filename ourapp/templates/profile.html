{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy2Pay - Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
         :root{
            --custom-width: 100vw;
            --design-width: 412;
            --ratio: calc(var(--custom-width) / var(--design-width));
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f9f9f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            background: white;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: white;
        }

        .easy2pay {
            width: 61.17%;
            height: 48.24%;
            top: 18.82%;
            left: 4.61%;
            z-index: 1;
            transform: rotate(0deg);
            text-align: left;
            line-height: 0px;
        }

        .easy {
            font-size: calc(40 * var(--ratio));
            letter-spacing: calc(4 * var(--ratio));
            line-height: calc(40 * var(--ratio));
  
            font-family: Inria Sans;
            font-weight: 500;
  
            text-decoration: none;
            text-transform: none;
            white-space: pre-wrap;
            color: #000000ff;
        }

        .menu-icon {
            font-size: 22px;
            cursor: pointer;
            color: #000000ff;
        }

        /* Profile Section */
        .profile-section {
            width: 93%;
            background: black;
            text-align: center;
            padding: 30px 0;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            margin: 0 auto; 
        }

        .profile-picture {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: auto;
            background: teal;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-picture img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
        }

        /* Profile Info */
        .profile-info {
            padding: 20px;
            width: 93%;
            margin: 0 auto; 
        }

        .info-group {
            margin-bottom: 15px;
            font-size: 16px;
        }

        .info-label {
            font-weight: bold;
            color: gray;
        }

        .info-value {
            color: black;
            font-size: 18px;
            margin-top: 5px;
        }

        /* Logout Button */
        .logout-btn {
            width: 93%;
            padding: 12px;
            background: black;
            color: white;
            font-size: 16px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            border: none;
            position: fixed;
            left: 50%;
            transform: translateX(-50%);
            bottom: 85px;
        }

        /* Bottom Navigation */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 10px;
            background: white;
            border-top: 1px solid #ddd;
            position: fixed;
            bottom: 0;
            width: 100%;
        }

        .nav-item {
            text-align: center;
            color: black;
            font-size: 14px;
        }

        .nav-item i {
            font-size: 20px;
            margin-bottom: 4px;
        }

        /* Active Tab */
        .nav-item.active {
            color: gray;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <div class="easy"><span class="easy2pay">Easy2Pay</span></div>
        <a href="{% url 'home' %}" style="text-decoration: none;"><i class="fa fa-home menu-icon"></i></a>
    </div>

    <!-- Profile Section -->
    <div class="profile-section">
        <div class="profile-picture">
          <img src="{% url 'profile_image' user_name %}" alt="Profile">
        </div>
    </div>

    <!-- Profile Info -->
    <div class="profile-info">
        <div class="info-group">
            <div class="info-label">Name</div>
            <div class="info-value">{{ user_name }}</div>
        </div>

        <div class="info-group">
            <div class="info-label">Email</div>
            <div class="info-value">{{ user_email }}</div>
        </div>
    </div>

    <!-- Logout Button -->
    <a href="{% url 'logout' %}" style="text-decoration: none;"><button class="logout-btn">
        Logout <i class="fa fa-sign-out-alt"></i>
    </button></a>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="{% url 'scan' %}" style="text-decoration: none;"><div class="nav-item">
            <i class="fa fa-qrcode"></i><br>Scan
        </div></a>
        <a href="{% url 'cart' %}" style="text-decoration: none;"><div class="nav-item">
            <i class="fa fa-shopping-cart"></i><br>Cart
        </div></a>
        <a href="{% url 'offers' %}" style="text-decoration: none;"><div class="nav-item">
            <i class="fa fa-tag"></i><br>Offers
        </div></a>
        <a href="{% url 'points' %}" style="text-decoration: none;"><div class="nav-item">
            <i class="fa fa-gift"></i><br>Redeem Points
        </div></a>
        <a href="{% url 'profile' %}" style="text-decoration: none;"><div class="nav-item active">
            <i class="fa fa-user"></i><br>Profile
        </div></a>
    </div>
</div>

</body>
</html>
