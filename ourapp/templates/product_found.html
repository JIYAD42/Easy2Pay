<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>easy2pay - Product Details</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
</head>
<body class="bg-gray-100">
    {% include 'navbar.html' %}
    <div class="min-h-screen">
        <div class="bg-blue-500 text-white py-4 text-center">
            <h1 class="text-2xl font-semibold">easy2pay</h1>
        </div>
        <div class="p-4">
            {% if product %}
            <div class="bg-white rounded shadow p-6 flex">
                <img src="{{ product.image.url }}" alt="Product Image" class="w-32 h-32 object-cover rounded">
                <div class="ml-6">
                    <h2 class="text-2xl font-semibold text-gray-800">{{ product.name }}</h2>
                    <p class="text-lg text-gray-600 mt-2"><strong>Price:</strong> ₹{{ product.price }}</p>
                    <p class="text-lg text-gray-600"><strong>Weight:</strong> {{ product.weight_or_quantity }}</p>
                </div>
            </div>
            <div class="mt-6 space-y-4">
                <form method="post" action="{% url 'add_to_cart' product.id %}">
                    {% csrf_token %}
                    <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded shadow hover:bg-blue-600">
                        Add to Cart
                    </button>
                </form>
                <a href="{% url 'scan' %}" class="block">
                    <button class="w-full bg-gray-200 text-gray-700 py-2 rounded shadow hover:bg-gray-300">
                        Scan Again
                    </button>
                </a>
                <a href="{% url 'cart' %}" class="block">
                    <button class="w-full bg-green-500 text-white py-2 rounded shadow hover:bg-green-600">
                        Visit Cart
                    </button>
                </a>
            </div>
            {% else %}
            <div class="bg-white p-6 shadow rounded text-center">
                <h2 class="text-xl font-semibold text-gray-800">No Product Found</h2>
                <p class="text-gray-600 mt-2">The code does not match any product in the database.</p>
                <div class="mt-6 space-y-4">
                    <a href="{% url 'scan' %}" class="block">
                        <button class="w-full bg-gray-200 text-gray-700 py-2 rounded shadow hover:bg-gray-300">
                            Scan Again
                        </button>
                    </a>
                    <a href="{% url 'cart' %}" class="block">
                        <button class="w-full bg-green-500 text-white py-2 rounded shadow hover:bg-green-600">
                            Visit Cart
                        </button>
                    </a>
                </div>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
