<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>easy2pay - Home</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
</head>
<body class="bg-gray-100">
    {% include 'navbar.html' %}
    <div class="min-h-screen flex flex-col items-center justify-center text-center">
        <h1 class="text-4xl font-bold text-blue-600 mb-6">easy2pay</h1>
        <p class="text-lg text-gray-600 max-w-md mb-6">
            Experience seamless shopping and effortless payments with easy2pay. Start your journey today and enjoy convenience like never before.
        </p>
        <button class="px-6 py-2 bg-blue-500 text-white rounded shadow hover:bg-blue-600">
            Start Purchasing
        </button>
        <div class="mt-10 flex space-x-6 text-blue-600">
            <a href="{% url 'scan' %}" class="flex flex-col items-center">
                <i class="fas fa-qrcode text-4xl"></i>
                <span class="mt-2 text-sm">Scan</span>
            </a>
            <a href="{% url 'cart' %}" class="flex flex-col items-center">
                <i class="fas fa-shopping-cart text-4xl"></i>
                <span class="mt-2 text-sm">Cart</span>
            </a>
            <a href="{% url 'profile' %}" class="flex flex-col items-center">
                <i class="fas fa-user text-4xl"></i>
                <span class="mt-2 text-sm">Profile</span>
            </a>
        </div>
    </div>
</body>
</html>
